<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Dodge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/game.css" />
</head>
<body>

  <!-- HEADER -->
  <header id="header">
    <div id="header-main">
      <div>
        <div id="header-title">Neon Dodge</div>
        <div id="header-sub">Survive the neon storm</div>
      </div>
      <div id="user-area"></div>
    </div>
  </header>

  <!-- LAYOUT PRINCIPAL -->
  <section id="game-section">

    <!-- Panel izquierdo: stats -->
    <div class="side-panel">
      <div class="stat-card">
        <div class="stat-label">Score</div>
        <div class="stat-value" id="hud-score">000000</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Best</div>
        <div class="stat-value accent" id="hud-best">000000</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Time</div>
        <div class="stat-value small" id="hud-time">0.0s</div>
      </div>
    </div>

    <!-- Canvas -->
    <div id="canvas-wrap">
      <canvas id="gameCanvas" width="560" height="400"></canvas>

      <!-- Toast de fase (aparece en pantalla durante el juego) -->
      <div id="phase-toast"></div>

      <!-- Overlay inicio / game over -->
      <div id="overlay"></div>

      <!-- Modal leaderboard global (sobre el canvas) -->
      <div id="lb-modal">
        <h3>Global leaderboard</h3>
        <div id="lb-list"><div class="lb-loading">Loading</div></div>
        <button id="lb-close">Close</button>
      </div>
    </div>

    <!-- Panel derecho: info + botones -->
    <div class="side-panel">
      <div class="info-card">
        <div class="info-title">How to play</div>
        <div class="info-row"><span class="info-key">Move</span><span class="info-val">Mouse / touch</span></div>
        <div class="info-row"><span class="info-key">Dodge</span><span class="info-val">All shapes</span></div>
        <div class="info-row"><span class="info-key">Survive</span><span class="info-val">As long as you can</span></div>
      </div>
      <div class="music-card">
        <div class="music-top">
          <span class="info-title" style="margin:0">Music</span>
          <button id="music-toggle" class="music-mute-btn" aria-label="Mute music">
            <svg id="music-icon-on" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            <svg id="music-icon-off" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
          </button>
        </div>
        <input type="range" id="music-volume" class="music-slider" min="0" max="100" value="80" aria-label="Music volume">
      </div>
      <button id="lb-btn">Global scores</button>
    </div>

  </section>

  <footer id="footer">Neon Dodge — move fast, stay alive</footer>

  <!-- Modal de autenticación (fixed, fuera del canvas) -->
  <div id="auth-modal"></div>

  <!-- ==========================================================
       SCRIPTS — orden importante
       ========================================================== -->

  <!-- Supabase JS desde CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- Módulos del juego -->
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/scores.js"></script>
  <script src="js/game.js"></script>
  <script src="js/music.js"></script>  <!-- ← AÑADIDO: antes de ui.js y main.js -->
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
